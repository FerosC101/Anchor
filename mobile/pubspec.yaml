name: anchor
description: Anchor — AI-powered protection platform for Overseas Filipino Workers
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.14.0
  firebase_auth: ^5.6.0
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.5
  cloud_functions: ^5.3.5
  firebase_messaging: ^15.2.5
  firebase_analytics: ^11.4.5

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Utilities
  intl: ^0.20.2
  equatable: ^2.0.7
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  file_picker: ^9.2.2

  # Charts
  fl_chart: ^0.69.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.14
  freezed: ^2.5.7
  json_serializable: ^6.9.3
  riverpod_generator: ^2.6.3

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
